services:
  - type: web
    name: vacation-optimizer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SERPAPI_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SERPAPI_ENABLED
        value: "true"
      - key: MAX_LIVE_COMBINATIONS
        value: "15"
